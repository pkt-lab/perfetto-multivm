# Linux guest configuration — CENTRAL traced role
#
# Runs upstream Perfetto traced as the central trace service.
# QNX host and QNX guest connect as relay clients via TCP:20001.
#
# Uses vdevpeer-net (TCP) only — no vsock needed for this evaluation.
# Network: 10.10.10.3/24 (guest) ↔ 10.10.10.1 (host) via vdevpeer vp0

system linux-central-guest
ram 0x80000000,512m
cpu
cpu

guest load /dev/shmem/linux-Image
initrd load /dev/shmem/initrd-linux-central.gz
fdt generate
cmdline "console=ttyAMA0 earlycon=pl011,0x1c090000 loglevel=8 init=/init"

vdev vdev-pl011
 loc 0x1c090000
 intr gic:37
 hostdev >/data/linux-central-console.log

vdev vdev-virtio-net
 loc 0x1c0b0000
 intr gic:39
 name p2p
 peer /dev/vdevpeers/vp0
 peerfeats 0x3
