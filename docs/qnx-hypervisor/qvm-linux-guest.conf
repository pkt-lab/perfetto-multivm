# AGL Linux Guest Configuration for QNX 8.0 Hypervisor
#
# Place this file at /dev/shmem/linux-guest.conf on the hypervisor host.
# Start with: /system/bin/qvm @/dev/shmem/linux-guest.conf
#
# Prerequisites on HV /dev/shmem/:
#   - linux-Image    — AGL 6.6.84 kernel (25MB, aarch64, virtio built-in)
#   - initrd-v11.gz  — initrd with Perfetto relay + low-churn workloads
#
# Prerequisites on HV /data/:
#   - linux-trace.img — 16MB zero-filled block device for standalone traces
#   - Console log file must exist before qvm starts (touch it first)
#
# Network: vdev-virtio-net via vdevpeer to HV host (10.10.10.3 ↔ 10.10.10.1)
#   HV host must add route: /system/bin/route add -host 10.10.10.3 -iface vp0

system linux-guest
ram 0x80000000,512m
cpu
cpu
guest load /dev/shmem/linux-Image
initrd load /dev/shmem/initrd-v11.gz
cmdline "console=ttyAMA0 earlycon=pl011,0x1c090000 loglevel=8 init=/init"

# PL011 UART — guest serial console
# NOTE: Console log file must exist before qvm starts
vdev vdev-pl011
 loc 0x1c090000
 intr gic:37
 hostdev >/data/linux-console.log

# virtio-blk — trace output device (for standalone mode)
vdev virtio-blk
 loc 0x1c0c0000
 intr gic:40
 hostdev /data/linux-trace.img
 name trace-disk

# virtio-net — peer networking to HV host
# Uses vp0 peer interface (QNX guest uses vp1)
vdev vdev-virtio-net
 loc 0x1c0b0000
 intr gic:39
 name p2p
 peer /dev/vdevpeers/vp0
 peerfeats 0x3
