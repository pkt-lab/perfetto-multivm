# QNX 8.0 Hypervisor Guest Configuration
#
# LICENSE WARNING: QNX SDP 8.0 is PROPRIETARY SOFTWARE owned by BlackBerry QNX.
# You MUST have a valid QNX license. This config file references QNX components
# but contains no QNX binaries or source code.
#
# Place this file at /dev/shmem/qnx-guest.conf on the hypervisor host.
# Start with: qvm @/dev/shmem/qnx-guest.conf
#
# Virtual hardware presented to guest: ARM Foundation Model layout
# Guest OS: QNX 8.0

system qnx-guest

# Guest RAM: 512 MB starting at 0x80000000
ram 0x80000000,512m

# Virtual CPU (inherits from host)
cpu

# Guest IFS binary (loaded into /dev/shmem/ via SSH pipe + dd)
guest load /dev/shmem/qnx-guest-ifs.bin

# PL011 UART — guest serial console
# ARM FM address: 0x1c090000, GIC SPI 37
# Output redirected to file on host for debugging
# NOTE: Create the log file first: touch /dev/shmem/qnx-guest-console.log
vdev vdev-pl011
 loc 0x1c090000
 intr gic:37
 hostdev >/dev/shmem/qnx-guest-console.log

# virtio-net — guest-to-host networking via vdevpeer
# ARM FM address: 0x1c0b0000, GIC SPI 39
# Connects to host io-sock via mods-vdevpeer-net.so + vpctl
# Host side: ifconfig vp0 create; vpctl vp0 peer=/dev/qvm/qnx-guest/vp0
vdev vdev-virtio-net
 loc 0x1c0b0000
 intr gic:39
 peer /dev/qvm/qnx-guest/vp0
 name /dev/qvm/qnx-guest/vp0

# virtio-blk — guest root filesystem (optional)
# ARM FM address: 0x1c0d0000, GIC SPI 41
# Maps hypervisor host's /dev/hd1 (second QEMU virtio-blk disk) into guest
#vdev vdev-virtio-blk
# loc 0x1c0d0000
# intr gic:41
# hostdev /dev/hd1
