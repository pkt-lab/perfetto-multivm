# AGL Linux Guest Configuration for QNX 8.0 Hypervisor
#
# Place this file at /data/linux-guest-v5.conf on the hypervisor host.
# Start with: qvm @/data/linux-guest-v5.conf
#
# Prerequisites:
#   - AGL kernel at /dev/shmem/linux-Image (25MB, aarch64)
#   - Initrd at /dev/shmem/initrd-v5.gz (40MB, with Perfetto binaries)
#   - Trace output block device at /data/linux-trace.img

system linux-guest-v5

# Guest RAM: 512 MB starting at 0x80000000
ram 0x80000000,512m

# Two virtual CPUs
cpu
cpu

# AGL Linux kernel (loaded into /dev/shmem/ via SSH pipe + dd)
guest load /dev/shmem/linux-Image

# Initrd with Perfetto binaries and init script
initrd load /dev/shmem/initrd-v5.gz

# Kernel command line
cmdline "console=ttyAMA0 earlycon=pl011,0x1c090000 loglevel=8 init=/init"

# PL011 UART — guest serial console
vdev vdev-pl011
  loc 0x1c090000
  intr gic:37
  hostdev >/data/linux-v5-console.log

# virtio-blk — trace output device
# The guest init script writes Perfetto traces to this device
vdev virtio-blk
  loc 0x1c0c0000
  intr gic:40
  hostdev /data/linux-trace.img
  name trace-disk
