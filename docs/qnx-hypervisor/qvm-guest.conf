# QNX 8.0 Hypervisor Guest Configuration
#
# LICENSE WARNING: QNX SDP 8.0 is PROPRIETARY SOFTWARE owned by BlackBerry QNX.
# You MUST have a valid QNX license. This config file references QNX components
# but contains no QNX binaries or source code.
#
# Place this file at /data/guest.conf on the hypervisor host filesystem.
# Start with: qvm @/data/guest.conf
#
# Virtual hardware presented to guest: ARM Foundation Model layout
# Guest OS: QNX 8.0 (startup-armv8_fm -H)

system qnx-guest

# Guest RAM: 512 MB starting at 0x80000000
ram 0x80000000,512m

# Virtual CPU (inherits from host)
cpu

# Guest IFS binary (on hypervisor host filesystem)
guest load /data/qnx-guest-ifs.bin

# PL011 UART — guest serial console
# ARM FM address: 0x1c090000, GIC SPI 37
# Output redirected to file on host for debugging
vdev vdev-pl011
 loc 0x1c090000
 intr gic:37
 hostdev >/data/guest-console.log

# virtio-console — alternative console access via pty
# Address: 0x20000000, GIC SPI 42
vdev vdev-virtio-console
 loc 0x20000000
 intr gic:42
 hostdev /dev/ptyp1

# virtio-blk — guest root filesystem
# ARM FM address: 0x1c0d0000, GIC SPI 41
# Maps hypervisor host's /dev/hd1 (second QEMU virtio-blk disk) into guest
vdev vdev-virtio-blk
 loc 0x1c0d0000
 intr gic:41
 hostdev /dev/hd1

# virtio-net — guest network (TBD / uncomment when ready)
# ARM FM address: 0x1c0b0000, GIC SPI 43
#vdev vdev-virtio-net
# loc 0x1c0b0000
# intr gic:43
# hostdev /dev/vdevnet0
